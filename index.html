<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">    
</head>
<body>
  <div class="left">
    <img src="https://images.unsplash.com/photo-1585202900225-6d3ac20a6962?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="background-img">
    <div><img src="https://raw.githubusercontent.com/TheOdinProject/curriculum/5f37d43908ef92499e95a9b90fc3cc291a95014c/html_css/project-sign-up-form/odin-lined.png" alt="Odin-logo">ODIN</div>
    <p>Photo by Halive Wast on Unsplash</p>
  </div>
  <div class="right">
    <p>This is a real online service!You know you need something like this in your life to help you realize your deepest dreams.
     <br> Sign up now to get started.
    </p>
    <p>You know you want to. </p>
    <div class="panel">
      <p>Let's do this!</p>
      <form action="/submit" method="post">
        <div class="box">
          <label for="first-name">FIRST NAME</label>
          <input type="text" id="first-name" name="first-name">
        </div>
        <div class="box">
          <label for="last-name">LAST NAME</label>
          <input type="text" id="last-name" name="last-name">
        </div>
        <div class="box">
          <label for="email">EMAIL</label>
          <input type="email" id="email" name="email">
        </div>
        <div class="box">
          <label for="phone">PHONE NUMBER</label>
          <input type="tel" id="phone" name="phone">
        </div>
        <div class="box">
          <label for="password">PASSWORD</label>
          <input type="password" id="password" name="password">
        </div>
        <div class="box">
          <label for="cpassword">CONFIRM PASSWORD</label>
          <input type="password" id="cpassword" name="confirm-password
          ">
        </div>

      </form>
    </div>
    <button>Create Account</button>
    <p>Already have an account? <a href="">Log in</a></p>
  </div>
</body>
<script src="script.js"></script>
</html>
